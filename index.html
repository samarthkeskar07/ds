<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Best of Luck - DBMS Practicals</title>
  <style>
    /* [Keep all your original CSS exactly the same - no changes needed] */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 20px;
      height: 100vh;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* ... [all your original CSS stays exactly the same] ... */
    /* [I won't repeat the full CSS here to save space, but keep it unchanged] */
  </style>
</head>
<body>
  <div class="header">
    <h1>Best of Luck - DBMS Practicals</h1>
    <button class="theme-toggle" onclick="toggleTheme()">Light</button>
  </div>

  <div class="container">
    <div class="row" id="row1"></div>
    <div class="row" id="row2"></div>
  </div>

  <script>
    const programs = [
      {
        title: "Pr1 - Heap Sort (C++)",
        code: `#include <iostream>
using namespace std;

void heapify(int arr[], int n, int i)
{
    int largest = i;
    int left = 2 * i + 1;
    int right = 2 * i + 2;

    if (left < n && arr[left] > arr[largest])
        largest = left;

    if (right < n && arr[right] > arr[largest])
        largest = right;

    if (largest != i)
    {
        swap(arr[i], arr[largest]);
        heapify(arr, n, largest);
    }
}

void heapSort(int arr[], int n)
{
    // Build max heap
    for (int i = n / 2 - 1; i >= 0; i--)
        heapify(arr, n, i);

    // Heap sort
    for (int i = n - 1; i > 0; i--)
    {
        swap(arr[0], arr[i]);
        heapify(arr, i, 0);
    }
}

int main()
{
    int arr[] = {12, 11, 13, 5, 6, 7};
    int n = sizeof(arr) / sizeof(arr[0]);

    heapSort(arr, n);

    cout << "Sorted array:\\n";

    for (int i = 0; i < n; i++)
        cout << arr[i] << " ";

    return 0;
}`
      },
      {
        title: "Pr2 - Heap Sort (Python)",
        code: `def heapify(arr, n, i):
    largest = i
    left = 2 * i + 1
    right = 2 * i + 2

    if left < n and arr[left] > arr[largest]:
        largest = left

    if right < n and arr[right] > arr[largest]:
        largest = right

    if largest != i:
        arr[i], arr[largest] = arr[largest], arr[i]
        heapify(arr, n, largest)


def heap_sort(arr):
    n = len(arr)

    # Build max heap
    for i in range(n // 2 - 1, -1, -1):
        heapify(arr, n, i)

    # Heap sort
    for i in range(n - 1, 0, -1):
        arr[i], arr[0] = arr[0], arr[i]
        heapify(arr, i, 0)


arr = [12, 11, 13, 5, 6, 7]

heap_sort(arr)

print("Sorted array:")
print(arr)`
      }
    ];

    // [Keep all your original JavaScript functions exactly the same]
    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // Update keywords to include C++ keywords
    const keywords = /\\b(CREATE|TABLE|PRIMARY|KEY|VARCHAR2|NUMBER|INSERT|INTO|VALUES|SELECT|FROM|WHERE|UPDATE|DELETE|SET|OR|REPLACE|TRIGGER|AFTER|ON|FOR|EACH|ROW|BEGIN|END|PROCEDURE|CURSOR|OPEN|LOOP|FETCH|EXIT|WHEN|CLOSE|FOREIGN|REFERENCES|JOIN|INNER|LEFT|RIGHT|VIEW|INDEX|SEQUENCE|SYNONYM|ALTER|ADD|MODIFY|DROP|COLUMN|RENAME|TRUNCATE|NOT|NULL|UNIQUE|CHECK|CONSTRAINT|IN|AS|IS|START|WITH|INCREMENT|BY|void|int|return|if|else|for|while|class|public|private|include|using|namespace|main|cout|cin)\\b/g;
    const types = /\\b(arr|n|i|largest|left|right|heapify|heapSort|swap|Employee|Department|Emp_Log|Emp_View|Emp_Dept_View|Emp|DBMS_OUTPUT|AVG|MAX)\\b/g;
    const strRe = /("[^"]*"|'[^']*')/g;
    const commentRe = /(\/\/.*$|\/\*[\s\S]*?\*\/)/gm;
    const numberRe = /\\b(\\d+)\\b/g;

    // [Rest of your original JavaScript stays the same - highlightLine, makeLines, toggleTheme, copyCode, etc.]
    function highlightLine(line) {
      let html = escHtml(line);
      html = html.replace(commentRe, '<span class="comment">$1</span>');
      html = html.replace(strRe, '<span class="string">$1</span>');
      html = html.replace(keywords, '<span class="keyword">$1</span>');
      html = html.replace(types, '<span class="type">$1</span>');
      html = html.replace(numberRe, '<span class="number">$1</span>');
      return html;
    }

    function makeLines(code) {
      const lines = code.split('\\n');
      return lines.map(l => {
        const has = keywords.test(l) || types.test(l);
        keywords.lastIndex = 0;
        types.lastIndex = 0;
        return `<div class="line${has ? ' has-keyword' : ''}">${highlightLine(l) || ' '}</div>`;
      }).join('');
    }

    function toggleTheme() {
      document.body.classList.toggle('light');
      const btn = document.querySelector('.theme-toggle');
      btn.textContent = document.body.classList.contains('light') ? 'Dark' : 'Light';
    }

    function copyCode(raw, btn) {
      navigator.clipboard.writeText(raw).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 1200);
      });
    }

    const row1 = document.getElementById('row1');
    const row2 = document.getElementById('row2');

    programs.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'card';

      const header = document.createElement('div');
      header.className = 'card-header';

      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = p.title;

      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.addEventListener('click', () => copyCode(p.code, btn));

      header.appendChild(title);
      header.appendChild(btn);

      const codeWrap = document.createElement('div');
      codeWrap.className = 'code-container';
      codeWrap.innerHTML = '<pre>' + makeLines(p.code) + '</pre>';

      card.appendChild(header);
      card.appendChild(codeWrap);

      if (i < 5) row1.appendChild(card);
      else row2.appendChild(card);
    });
  </script>
</body>
</html>
